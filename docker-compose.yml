name: ecommerce-microservices

services:
  postgres:
    image: postgres:17
    restart: unless-stopped

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    networks:
      - ecommerce-network

  mongo:
    image: mongo:8.0
    restart: unless-stopped

    ports:
      - "${MONGO_PORT:-27017}:27017"

    volumes:
      - mongo_data:/data/db

    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    networks:
      - ecommerce-network

  kafka:
    image: apache/kafka:4.3.0
    restart: unless-stopped
    hostname: kafka

    ports:
      - "${KAFKA_PORT:-9092}:9092"

    environment:
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: >-
        CONTROLLER://:9093,
        PLAINTEXT://:29092,
        PLAINTEXT_HOST://:9092

      KAFKA_ADVERTISED_LISTENERS: >-
        PLAINTEXT://kafka:29092,
        PLAINTEXT_HOST://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >-
        CONTROLLER:PLAINTEXT,
        PLAINTEXT:PLAINTEXT,
        PLAINTEXT_HOST:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list >/dev/null 2>&1"
        ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

    networks:
      - ecommerce-network

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile

    restart: unless-stopped

    ports:
      - "${EUREKA_PORT:-8761}:8761"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'echo > /dev/tcp/127.0.0.1/8761'"
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

    networks:
      - ecommerce-network

  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile

    restart: unless-stopped

    ports:
      - "${CONFIG_SERVER_PORT:-8888}:8888"

    environment:
      CONFIG_REPO_LOCATION: "file:/configrepo"
      EUREKA_DEFAULT_ZONE: "http://eureka-server:8761/eureka"
      EUREKA_INSTANCE_HOSTNAME: "config-server"

    volumes:
      - ./config-server/configrepo:/configrepo:ro

    depends_on:
      eureka-server:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'echo > /dev/tcp/127.0.0.1/8888'"
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

    networks:
      - ecommerce-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile

    restart: unless-stopped

    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"

    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
      CONFIG_SERVER_URL: "http://config-server:8888"
      EUREKA_DEFAULT_ZONE: "http://eureka-server:8761/eureka"
      EUREKA_INSTANCE_HOSTNAME: "api-gateway"

    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'echo > /dev/tcp/127.0.0.1/8080'"
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

    networks:
      - ecommerce-network

volumes:
  postgres_data:
    name: ecommerce-microservices_postgres_data

  mongo_data:
    name: ecommerce-microservices_mongo_data

networks:
  ecommerce-network:
    name: ecommerce-network
    driver: bridge