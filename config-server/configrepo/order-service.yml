server:
  port: 8082

spring:
  datasource:
    url: ${ORDER_DB_URL:jdbc:postgresql://localhost:5432/order_db}
    username: ${ORDER_DB_USERNAME:postgres}
    password: ${ORDER_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      group-id: ${ORDER_KAFKA_CONSUMER_GROUP:order-service}
      auto-offset-reset: latest

order:
  kafka:
    topics:
      order-created: ${ORDER_CREATED_TOPIC:order-created}
      payment-succeeded: ${PAYMENT_SUCCEEDED_TOPIC:payment-succeeded}
      payment-failed: ${PAYMENT_FAILED_TOPIC:payment-failed}
      inventory-reservation-failed: ${INVENTORY_RESERVATION_FAILED_TOPIC:inventory-reservation-failed}

    retry:
      interval-ms: 2000
      max-retries: 2

    producer:
      max-block-ms: ${ORDER_KAFKA_MAX_BLOCK_MS:3000}
      request-timeout-ms: ${ORDER_KAFKA_REQUEST_TIMEOUT_MS:3000}
      delivery-timeout-ms: ${ORDER_KAFKA_DELIVERY_TIMEOUT_MS:8000}

  outbox:
    publisher:
      fixed-delay-ms: ${ORDER_OUTBOX_FIXED_DELAY_MS:2000}
      initial-delay-ms: ${ORDER_OUTBOX_INITIAL_DELAY_MS:3000}
      batch-size: ${ORDER_OUTBOX_BATCH_SIZE:20}
      send-timeout-seconds: ${ORDER_OUTBOX_SEND_TIMEOUT_SECONDS:10}
      retry-delay-ms: ${ORDER_OUTBOX_RETRY_DELAY_MS:5000}