server:
  port: 8085

spring:
  data:
    mongodb:
      uri: ${INVENTORY_MONGO_URI:mongodb://localhost:27017/inventory_db}
      auto-index-creation: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: inventory-service
      auto-offset-reset: earliest