server:
  port: 8081

spring:
  datasource:
    url: ${CUSTOMER_DB_URL:jdbc:postgresql://localhost:5432/customer_db}
    username: ${CUSTOMER_DB_USERNAME:postgres}
    password: ${CUSTOMER_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true