server:
  port: 8086

spring:
  datasource:
    url: ${PAYMENT_DB_URL:jdbc:postgresql://localhost:5432/payment_db}
    username: ${PAYMENT_DB_USERNAME:postgres}
    password: ${PAYMENT_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: payment-service
      auto-offset-reset: latest

payment:
  kafka:
    topics:
      inventory-reserved: ${INVENTORY_RESERVED_TOPIC:inventory-reserved}
      succeeded: ${PAYMENT_SUCCEEDED_TOPIC:payment-succeeded}
      failed: ${PAYMENT_FAILED_TOPIC:payment-failed}

    retry:
      interval-ms: 2000
      max-retries: 2

  processing:
    simulation:
      failure-threshold: ${PAYMENT_FAILURE_THRESHOLD:100000.00}