server:
  port: 8086

spring:
  datasource:
    url: ${PAYMENT_DB_URL:jdbc:postgresql://localhost:5432/payment_db}
    username: ${PAYMENT_DB_USERNAME:postgres}
    password: ${PAYMENT_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

    # Publisher, maintenance ve monitoring scheduler'ları
    # düzenli sorgu çalıştırdığı için SQL loglarını kapatıyoruz.
    show-sql: false

    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      group-id: ${PAYMENT_KAFKA_CONSUMER_GROUP:payment-service}
      auto-offset-reset: latest

payment:
  processing:
    simulation:
      failure-threshold: ${PAYMENT_FAILURE_THRESHOLD:100000}

  kafka:
    topics:
      inventory-reserved: ${INVENTORY_RESERVED_TOPIC:inventory-reserved}
      succeeded: ${PAYMENT_SUCCEEDED_TOPIC:payment-succeeded}
      failed: ${PAYMENT_FAILED_TOPIC:payment-failed}

    retry:
      interval-ms: ${PAYMENT_KAFKA_RETRY_INTERVAL_MS:2000}
      max-retries: ${PAYMENT_KAFKA_MAX_RETRIES:2}

    producer:
      max-block-ms: ${PAYMENT_KAFKA_MAX_BLOCK_MS:3000}
      request-timeout-ms: ${PAYMENT_KAFKA_REQUEST_TIMEOUT_MS:3000}
      delivery-timeout-ms: ${PAYMENT_KAFKA_DELIVERY_TIMEOUT_MS:8000}

  outbox:
    publisher:
      fixed-delay-ms: ${PAYMENT_OUTBOX_FIXED_DELAY_MS:5000}
      initial-delay-ms: ${PAYMENT_OUTBOX_INITIAL_DELAY_MS:3000}
      batch-size: ${PAYMENT_OUTBOX_BATCH_SIZE:20}
      send-timeout-seconds: ${PAYMENT_OUTBOX_SEND_TIMEOUT_SECONDS:10}
      retry-delay-ms: ${PAYMENT_OUTBOX_RETRY_DELAY_MS:5000}

    maintenance:
      enabled: ${PAYMENT_OUTBOX_MAINTENANCE_ENABLED:true}

      # Normal kullanımda saatte bir bakım yapılır.
      fixed-delay-ms: ${PAYMENT_OUTBOX_MAINTENANCE_FIXED_DELAY_MS:3600000}

      # Servis başladıktan bir dakika sonra ilk bakım yapılır.
      initial-delay-ms: ${PAYMENT_OUTBOX_MAINTENANCE_INITIAL_DELAY_MS:60000}

      # Yedi günden eski PUBLISHED kayıtlar temizlenir.
      retention-days: ${PAYMENT_OUTBOX_RETENTION_DAYS:7}

      # Her bakım çalışmasında en fazla 500 kayıt silinir.
      cleanup-batch-size: ${PAYMENT_OUTBOX_CLEANUP_BATCH_SIZE:500}

    monitoring:
      enabled: ${PAYMENT_OUTBOX_MONITORING_ENABLED:true}

      # Outbox durumu dakikada bir kontrol edilir.
      fixed-delay-ms: ${PAYMENT_OUTBOX_MONITORING_FIXED_DELAY_MS:60000}

      # Servis başladıktan 15 saniye sonra ilk kontrol yapılır.
      initial-delay-ms: ${PAYMENT_OUTBOX_MONITORING_INITIAL_DELAY_MS:15000}

      # Üç veya daha fazla retry alan PENDING kayıtlar
      # uyarı üretir.
      high-retry-threshold: ${PAYMENT_OUTBOX_HIGH_RETRY_THRESHOLD:3}

      # Altmış saniyeden uzun süre bekleyen PENDING
      # event uyarı üretir.
      oldest-pending-warning-seconds: ${PAYMENT_OUTBOX_OLDEST_PENDING_WARNING_SECONDS:60}